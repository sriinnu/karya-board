<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="board" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>

  <!-- Board/clipboard shape -->
  <rect x="28" y="20" width="72" height="88" rx="8" fill="url(#board)"/>

  <!-- Board top clip -->
  <rect x="44" y="14" width="40" height="12" rx="4" fill="#334155"/>

  <!-- Clip detail -->
  <rect x="54" y="16" width="20" height="4" rx="2" fill="#64748b"/>

  <!-- Checkbox 1 - checked -->
  <rect x="36" y="38" width="12" height="12" rx="2" fill="#0ea5e9"/>
  <path d="M38 44 L41 47 L46 41" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Line 1 -->
  <rect x="52" y="40" width="40" height="4" rx="2" fill="#cbd5e1"/>

  <!-- Checkbox 2 - unchecked -->
  <rect x="36" y="58" width="12" height="12" rx="2" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Line 2 -->
  <rect x="52" y="60" width="32" height="4" rx="2" fill="#cbd5e1"/>

  <!-- Checkbox 3 - unchecked -->
  <rect x="36" y="78" width="12" height="12" rx="2" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Line 3 -->
  <rect x="52" y="80" width="36" height="4" rx="2" fill="#cbd5e1"/>

  <!-- Checkbox 4 - unchecked -->
  <rect x="36" y="98" width="12" height="12" rx="2" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Line 4 -->
  <rect x="52" y="100" width="28" height="4" rx="2" fill="#cbd5e1"/>
</svg>
